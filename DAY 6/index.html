<!DOCTYPE html>
<html lang="en">
    <head>
            <link href="bootstrap.min.css" rel="stylesheet" >
            <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
            <link href="style.css" rel="stylesheet">
    </head>
    <body class="bg-light">
        <div class="container py-5">
            <h2 class="text-center mb-4">Students Records</h2>
            <input type="text" id="search" class="form-control mb-4" placeholder="Search Student">
            <div id="container" class="row g-4"></div>
        </div>
        <script>
            const student = [
                { name : "MAX" , branch :"CSE" , cgpa : 9.9,img: "shreyansh.jpg" },
                {name : "JONAS" , branch :"IT" , cgpa : 9.0 ,img: "aaditya.jpg"},
                {name : "WILLIAM" , branch :"ECE" , cgpa : 9.0 ,img: "kanishk.webp"},
                {name : "NANCY" , branch :"AI" , cgpa : 9.0,img: "kanishka.jpg" },
                {name : "GLADERIAL" , branch :"IOT" , cgpa : 8.6,img: "labhanshi.jpg" },
                {name : "SANSA" , branch :"DS" , cgpa : 7.0,img: "pratiksha.webp"  },
                {name : "JOHN" , branch :"ME" , cgpa : 7.9,img: "navneet.jpg"},
                {name : "LUCAS" , branch :"CE" , cgpa : 9.0 ,img: "priyanshu.jpg"},
                {name : "TAYLOR" , branch :"CSE" , cgpa : 7.9,img: "chandni.jpg" },
            ];
            let html = "";
            for(let i=0;i< student.length;i++){
                html += `
                <div class="col-md-4 card-item">
                    <div class="card shadow">
                        <div class="card-body">
                             <img src="${student[i].img}" class="img-fluid mt-2" alt="Student Image">        
                            
                            <h4>${student[i].name}</h4>
                            <button class="btn btn-primary btn-sm mt-2">
                                show details
                            </button>
                            <div class="details mt-3" style="display:none;">
                                <p><strong>branch:</strong>${student[i].branch}</p>
                                <p><strong>cgpa:</strong>${student[i].cgpa}</p>
                               
                               
                                   
                            </div>
                        </div>
                    </div>
                </div>   
            
            `;
                
            }
            document.getElementById("container").innerHTML =html;
            
            $(document).on("click",".btn",function(){
                $(this).next(".details").slideToggle();
            });
            $("#search").keyup(function(){
                let val = $(this).val().toLowerCase();

                $(".card-item").each(function(){
                    let name=$(this).find("h4").text().toLowerCase();
                    if(name.includes(val)){
                        $(this).show();

                    }
                    else{
                        $(this).hide();
                    }
                });
            });
        </script>
    </body>
</html>
